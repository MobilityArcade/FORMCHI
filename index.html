<script>
let scene, camera, renderer;
let formGroup, material;
let ringGroup;

let gameStarted = false;
let paused = false;

let resonance = 0;
let cycleActive = false;

let progress = 0;
let chakraIndex = 0;
let ascension = 0;

const puzzlesPerLevel = 7;
const maxAscension = 7;

let lastX = 0;
let lastY = 0;
let lastShoulderWidth = 0;
let lastHipY = 0;

let horizontalEnergy = 0;
let verticalEnergy = 0;
let shakeEnergy = 0;
let clapEnergy = 0;
let jumpEnergy = 0;
let stillnessEnergy = 0;
let expandEnergy = 0;
let wristHorizontalEnergy = 0;
let wristVerticalEnergy = 0;
let depthEnergy = 0;
let circleEnergy = 0;
let twoHandsEnergy = 0;
let lastLeftWristX = 0;
let lastLeftWristY = 0;
let lastRightWristX = 0;
let lastRightWristY = 0;
let lastAvgWristZ = 0;

const tutorialStorageVersion = "v12";
const tutorialCompleteKey = `formchi_tutorial_${tutorialStorageVersion}_complete`;
const tutorialStepKey = `formchi_tutorial_${tutorialStorageVersion}_step`;
let tutorialMode = localStorage.getItem(tutorialCompleteKey) !== "true";
let tutorialStep = parseInt(localStorage.getItem(tutorialStepKey)) || 0;
let currentRequiredMove = "wave";
let pinchFlipTimer = null;

const tutorialMoves = [
    "wave",
    "push",
    "pull",
    "circle",
    "hold",
    "doublehold",
    "openclose"
];

let completing = false;

let audioCtx;
let masterGain;
let ambientOsc;
let ambientGain;
let onboardingOsc;
let onboardingGain;

let nextHeartbeatTime = 0;

const video = document.getElementById("video");
const chakraColumn = document.getElementById("chakraColumn");
const ascensionColumn = document.getElementById("ascensionColumn");
const bottomDots = document.getElementById("bottomDots");
const formText = document.getElementById("formText");
const chiText = document.getElementById("chiText");
const tutorialHint = document.getElementById("tutorialHint");

const chakraData = [
    { color:0xff3b30, shape:"cube", mode:"reach", tone:110 },
    { color:0xff9500, shape:"icosahedron", mode:"expand", tone:146 },
    { color:0xffcc00, shape:"tetrahedron", mode:"heart", tone:196 },
    { color:0x34c759, shape:"octahedron", mode:"shake", tone:220 },
    { color:0x007aff, shape:"dodecahedron", mode:"jump", tone:293 },
    { color:0x5856d6, shape:"merkaba", mode:"clap", tone:392 },
    { color:0xaf52de, shape:"sphere", mode:"stillness", tone:440 }
];




function emojiHand() {
    return `
    <div class="tutorialIcon emojiSingleHand" aria-hidden="true">
        🤚
    </div>
    `;
}

function handOutlineSVG(flip=false, innerClass="tutorialIcon") {
    const scale = flip ? 'scale(-1,1) translate(-100,0)' : '';

    // FORMCHI V11: clean transparent open-hand outline.
    // Four fingers + thumb, no interior fill, no fist, no extra divider lines.
    return `
    <span class="${innerClass}">
        <svg viewBox="0 0 100 100" aria-hidden="true">
            <g transform="${scale}">
                <path
                    d="M19 82
                       C13 75 10 67 10 58
                       L10 50
                       C10 44 14 40 20 40
                       C24 40 27 42 30 46
                       L30 30
                       C30 24 34 20 40 20
                       C42 20 45 21 47 24
                       L47 20
                       C47 14 51 10 57 10
                       C63 10 67 14 67 20
                       L67 24
                       C69 21 72 20 76 20
                       C82 20 86 24 86 31
                       L86 57
                       C86 76 72 90 53 90
                       L36 90
                       C29 90 23 87 19 82 Z"
                    fill="none"
                    stroke="#111"
                    stroke-width="6.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                />
            </g>
        </svg>
    </span>`;
}

function twoHandsOutlineSVG() {
    return `
    <span class="twoHandsWrap">
        <span class="leftHand">${handOutlineSVG(false, "tutorialIconInner")}</span>
        <span class="rightHand">${handOutlineSVG(true, "tutorialIconInner")}</span>
    </span>`;
}

function chooseRandomMove() {
    const nextMove = tutorialMoves[Math.floor(Math.random() * tutorialMoves.length)];
    currentRequiredMove = nextMove;
    return nextMove;
}

function setTutorialHint(move) {
    if (!tutorialHint) return;

    if (pinchFlipTimer) {
        clearInterval(pinchFlipTimer);
        pinchFlipTimer = null;
    }

    tutorialHint.className = "tutorialVisible";
    tutorialHint.style.display = "block";
    tutorialHint.style.opacity = "1";
    tutorialHint.style.visibility = "visible";
    tutorialHint.style.zIndex = "999999999";

    if (move === "wave") {
        tutorialHint.innerHTML = emojiHand();
        tutorialHint.classList.add("waveHint");
    } else if (move === "push") {
        tutorialHint.innerHTML = emojiHand();
        tutorialHint.classList.add("pushHint");
    } else if (move === "pull") {
        tutorialHint.innerHTML = emojiHand();
        tutorialHint.classList.add("pullHint");
    } else if (move === "circle") {
        tutorialHint.innerHTML = emojiHand();
        tutorialHint.classList.add("circleHint");
    } else if (move === "hold") {
        tutorialHint.innerHTML = emojiHand();
        tutorialHint.classList.add("holdHint");
    } else if (move === "doublehold") {
        tutorialHint.innerHTML = `
            <div class="emojiDoubleHold" aria-hidden="true">
                <span class="leftHandEmoji">🫲</span>
                <span class="rightHandEmoji">🫱</span>
            </div>
        `;
        tutorialHint.classList.add("doubleholdHint");
    } else if (move === "openclose") {
        tutorialHint.innerHTML = `
            <div class="emojiCrossHands" aria-hidden="true">
                <span class="leftHandEmoji">🫲</span>
                <span class="rightHandEmoji">🫱</span>
            </div>
        `;
        tutorialHint.classList.add("opencloseHint");
    }
}

function showTutorialHint() {
    if (!tutorialMode || !tutorialHint) return;

    tutorialStep = Math.max(0, Math.min(tutorialStep, tutorialMoves.length - 1));
    currentRequiredMove = tutorialMoves[tutorialStep];
    setTutorialHint(currentRequiredMove);

    // Force visible for testing/build stability.
    tutorialHint.style.display = "block";
    tutorialHint.style.opacity = "1";
}

function hideTutorialHint() {
    if (!tutorialHint) return;

    if (pinchFlipTimer) {
        clearInterval(pinchFlipTimer);
        pinchFlipTimer = null;
    }

    tutorialHint.className = "tutorialHidden";
    tutorialHint.style.opacity = "0";
    tutorialHint.style.visibility = "hidden";
    tutorialHint.style.display = "none";
}

function completeTutorialStep() {
    const completedMove = tutorialMoves[tutorialStep];

    gtag('event', 'tutorial_step_completed', {
        step: tutorialStep + 1,
        move: completedMove
    });

    tutorialStep++;
    localStorage.setItem(tutorialStepKey, tutorialStep);

    if (tutorialStep >= tutorialMoves.length) {
        tutorialMode = false;
        localStorage.setItem(tutorialCompleteKey, "true");
        hideTutorialHint();
        chooseRandomMove();

        gtag('event', 'tutorial_completed');
    } else {
        currentRequiredMove = tutorialMoves[tutorialStep];
        setTutorialHint(currentRequiredMove);
    }
}

function getMoveInfluence(move) {
    switch(move) {
        case "wave":
            return Math.max(wristHorizontalEnergy, horizontalEnergy);

        case "push":
            return Math.max(depthEnergy, expandEnergy, wristVerticalEnergy * 0.6);

        case "pull":
            return Math.max(depthEnergy, expandEnergy, wristVerticalEnergy * 0.6);

        case "circle":
            return Math.max(circleEnergy, Math.min(1, (wristHorizontalEnergy + wristVerticalEnergy) * 0.7));

        case "hold":
            return stillnessEnergy > 0.88 ? stillnessEnergy : 0;

        case "doublehold":
            return stillnessEnergy > 0.88 ? stillnessEnergy : 0;

        case "openclose":
            return Math.max(twoHandsEnergy, clapEnergy, expandEnergy, wristHorizontalEnergy * 0.45);
    }

    return 0;
}

function saveGame() {
    localStorage.setItem("formchi_progress", progress);
    localStorage.setItem("formchi_chakra", chakraIndex);
    localStorage.setItem("formchi_ascension", ascension);
}

function loadGame() {

}

function buildUI() {

    bottomDots.innerHTML = "";

    chakraData.forEach(() => {
        const d = document.createElement("div");
        d.className = "dot";

    });

        const d = document.createElement("div");
        d.className = "ascensionDot";
        ascensionColumn.appendChild(d);
    });

    for (let i = 0; i < 7; i++) {
        const d = document.createElement("div");
        d.className = "progressDot";

    }

function glowDot(dot, color) {
    dot.style.background = color;
    dot.style.opacity = 1;
    dot.style.boxShadow = `0 0 16px ${color}`;
}

function clearDot(dot) {
    dot.style.background = "transparent";
    dot.style.boxShadow = "none";
    dot.style.opacity = 0.25;
}

function updateUI() {
    const currentColor =
    "#" + chakraData[chakraIndex].color.toString(16).padStart(6,"0");

    document.querySelectorAll(".dot").forEach((d, i) => {
        clearDot(d);

        if (i < chakraIndex) {
            const c = "#" + chakraData[i].color.toString(16).padStart(6,"0");
            glowDot(d, c);
        }

        if (i === chakraIndex) {
            glowDot(d, currentColor);
        }
    });

    document.querySelectorAll(".ascensionDot").forEach((d, i) => {
        clearDot(d);

        if (i < ascension) {
            const c = "#" + chakraData[i].color.toString(16).padStart(6,"0");
            glowDot(d, c);
        }
    });

    document.querySelectorAll(".progressDot").forEach((d, i) => {
        if (i < progress) {
            glowDot(d, currentColor);
        } else {
            clearDot(d);
        }
    });
}

function initThree() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color("#f5f4ee");

    camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100
    );

    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    material = new THREE.MeshPhysicalMaterial({
        color: chakraData[chakraIndex].color,
        emissive: chakraData[chakraIndex].color,
        emissiveIntensity: 0.3,
        roughness: 0.35,
        metalness: 0.8,
        clearcoat: 1,
        flatShading: true,
        side: THREE.DoubleSide
    });

    formGroup = new THREE.Group();
    ringGroup = new THREE.Group();

    scene.add(ringGroup);
    scene.add(formGroup);

    createShape();
    createAscensionRings();

    const light1 = new THREE.DirectionalLight(0xffffff, 5);
    light1.position.set(5,5,5);
    scene.add(light1);

    const light2 = new THREE.DirectionalLight(0xffffff, 3);
    light2.position.set(-5,-5,5);
    scene.add(light2);

    scene.add(new THREE.AmbientLight(0xffffff, 2));

    window.addEventListener("resize", onResize);

    animate();
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function createMerkaba() {
    const group = new THREE.Group();
    const geo = new THREE.TetrahedronGeometry(1);

    const top = new THREE.Mesh(geo, material);
    const bottom = new THREE.Mesh(geo, material);

    top.rotation.y = Math.PI / 4;
    bottom.rotation.x = Math.PI;
    bottom.rotation.y = Math.PI / 4;

    group.add(top);
    group.add(bottom);

    return group;
}

function createShape() {
    while (formGroup.children.length) {
        formGroup.remove(formGroup.children[0]);
    }

    const shape = chakraData[chakraIndex].shape;
    let mesh;

    if (shape === "cube") {
        mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), material);
    } else if (shape === "icosahedron") {
        mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(1), material);
    } else if (shape === "tetrahedron") {
        mesh = new THREE.Mesh(new THREE.TetrahedronGeometry(1), material);
    } else if (shape === "octahedron") {
        mesh = new THREE.Mesh(new THREE.OctahedronGeometry(1), material);
    } else if (shape === "dodecahedron") {
        mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(1), material);
    } else if (shape === "sphere") {
        mesh = new THREE.Mesh(new THREE.SphereGeometry(1,48,48), material);
    } else if (shape === "merkaba") {
        mesh = createMerkaba();
    }

    formGroup.add(mesh);

    material.color.setHex(chakraData[chakraIndex].color);
    material.emissive.setHex(chakraData[chakraIndex].color);
    material.opacity = 1;
    material.transparent = false;

    updateAmbientTone();
}

function createAscensionRings() {
    while (ringGroup.children.length) {
        ringGroup.remove(ringGroup.children[0]);
    }

    for (let r = 0; r < ascension; r++) {
        const ring = new THREE.Group();

        const radius = 1.65 + r * 0.34;
        const dots = 96;

        for (let i = 0; i < dots; i++) {
            const angle = (i / dots) * Math.PI * 2;

            const dotGeo = new THREE.SphereGeometry(0.018, 8, 8);
            const dotMat = new THREE.MeshBasicMaterial({
                color: 0x111111,
                transparent: true,
                opacity: 0.78
            });

            const dot = new THREE.Mesh(dotGeo, dotMat);

            dot.position.set(
                Math.cos(angle) * radius,
                Math.sin(angle) * radius,
                -0.05 * r
            );

            ring.add(dot);
        }

        ring.userData.baseRadius = radius;
        ring.userData.layer = r + 1;

        ringGroup.add(ring);
    }
}

async function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1;
    masterGain.connect(audioCtx.destination);

    createAmbientTone();
}

function createAmbientTone() {
    ambientOsc = audioCtx.createOscillator();
    ambientGain = audioCtx.createGain();

    ambientOsc.type = "sine";
    ambientOsc.frequency.value = chakraData[chakraIndex].tone;

    ambientGain.gain.value = chakraIndex <= 1 ? 0.065 : 0.04;

    ambientOsc.connect(ambientGain);
    ambientGain.connect(masterGain);
    ambientOsc.start();
}

function startOnboardingTone() {

    if (!audioCtx) return;

    if (onboardingOsc) return;

    onboardingOsc = audioCtx.createOscillator();
    onboardingGain = audioCtx.createGain();

    onboardingOsc.type = "sine";

    onboardingOsc.frequency.value = 110;

    onboardingGain.gain.value = 0.008;

    onboardingOsc.connect(onboardingGain);
    onboardingGain.connect(masterGain);

    onboardingOsc.start();
}

function stopOnboardingTone() {

    if (!onboardingOsc) return;

    onboardingGain.gain.linearRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + 1
    );

    onboardingOsc.stop(audioCtx.currentTime + 1);

    onboardingOsc = null;
}
    
function updateAmbientTone() {
    if (!ambientOsc || !audioCtx || !ambientGain) return;

    ambientOsc.frequency.linearRampToValueAtTime(
        chakraData[chakraIndex].tone,
        audioCtx.currentTime + 0.8
    );

    const targetGain = chakraIndex <= 1 ? 0.065 : 0.04;

    ambientGain.gain.linearRampToValueAtTime(
        targetGain,
        audioCtx.currentTime + 0.8
    );
}

function playHeartbeat() {
    if (!audioCtx || !masterGain) return;

    const now = audioCtx.currentTime;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(88, now);
    osc.frequency.exponentialRampToValueAtTime(42, now + 0.18);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.38, now + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start(now);
    osc.stop(now + 0.26);
}

function playDeflate() {
    if (!audioCtx || !masterGain) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";

    osc.frequency.setValueAtTime(180, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(45, audioCtx.currentTime + 1.5);

    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.55, audioCtx.currentTime + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.8);

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start();
    osc.stop(audioCtx.currentTime + 2);
}

async function startTracking() {
    const pose = new Pose({
        locateFile: file =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    pose.onResults(onPose);

    const stream = await navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: { ideal: "user" },
            width: { ideal: 640 },
            height: { ideal: 480 }
        },
        audio: false
    });

    gtag('event', 'camera_permission_granted');

    video.srcObject = stream;
    await video.play();

    async function sendFrame() {
        if (video.readyState >= 2) {
            await pose.send({ image: video });
        }

        requestAnimationFrame(sendFrame);
    }

    sendFrame();
}

function onPose(results) {
    if (!results.poseLandmarks) return;

    const lm = results.poseLandmarks;

    const leftShoulder = lm[11];
    const rightShoulder = lm[12];

    const leftWrist = lm[15];
    const rightWrist = lm[16];

    const leftHip = lm[23];
    const rightHip = lm[24];

    const centerX = (leftShoulder.x + rightShoulder.x) / 2;
    const centerY = (leftShoulder.y + rightShoulder.y) / 2;

    const dx = centerX - lastX;
    const dy = centerY - lastY;

    horizontalEnergy = Math.min(1, Math.abs(dx) * 40);
    verticalEnergy = Math.min(1, Math.abs(dy) * 40);

    const shoulderWidth = Math.abs(leftShoulder.x - rightShoulder.x);
    expandEnergy = Math.max(0, (shoulderWidth - lastShoulderWidth) * 12);

    shakeEnergy = Math.min(1, Math.abs(dx) * 65);

    const hipY = (leftHip.y + rightHip.y) / 2;
    jumpEnergy = Math.min(1, Math.abs(hipY - lastHipY) * 18);

    const handDistance = Math.abs(leftWrist.x - rightWrist.x);

    const leftWristDX = leftWrist.x - lastLeftWristX;
    const rightWristDX = rightWrist.x - lastRightWristX;
    const leftWristDY = leftWrist.y - lastLeftWristY;
    const rightWristDY = rightWrist.y - lastRightWristY;

    wristHorizontalEnergy = Math.min(1, (Math.abs(leftWristDX) + Math.abs(rightWristDX)) * 38);
    wristVerticalEnergy = Math.min(1, (Math.abs(leftWristDY) + Math.abs(rightWristDY)) * 38);

    const avgWristZ = ((leftWrist.z || 0) + (rightWrist.z || 0)) / 2;
    depthEnergy = Math.min(1, Math.abs(avgWristZ - lastAvgWristZ) * 18);

    circleEnergy = Math.min(1, Math.min(wristHorizontalEnergy, wristVerticalEnergy) * 1.8);

    if (handDistance < 0.05) {
        clapEnergy = 1;
    }

    twoHandsEnergy = Math.max(0, 1 - handDistance * 4) * Math.max(wristHorizontalEnergy, wristVerticalEnergy, depthEnergy);

    clapEnergy *= 0.92;

    lastLeftWristX = leftWrist.x;
    lastLeftWristY = leftWrist.y;
    lastRightWristX = rightWrist.x;
    lastRightWristY = rightWrist.y;
    lastAvgWristZ = avgWristZ;

    const movement = Math.abs(dx) + Math.abs(dy);
    stillnessEnergy = Math.max(0, 1 - movement * 22);

    lastShoulderWidth = shoulderWidth;
    lastHipY = hipY;
    lastX = centerX;
    lastY = centerY;
}

function getInfluence() {
    if (tutorialMode) {
        return getMoveInfluence(tutorialMoves[tutorialStep]);
    }

    return getMoveInfluence(currentRequiredMove);
}

});
            

if (chakraIndex === 0) {

function animate() {
    requestAnimationFrame(animate);

    if (!paused) {
        const influence = gameStarted ? getInfluence() : 0;

        const growthRate = 0.012;
        const decayRate = 0.004;

        if (influence > 0.12) {
            
            if (!cycleActive) {

    cycleActive = true;

    if (!firstResonanceTracked) {

        gtag('event', 'first_resonance');

        firstResonanceTracked = true;

    }

}

            resonance += influence * growthRate;
        } else {
            resonance -= decayRate;
        }

        resonance = Math.max(0, Math.min(1, resonance));

        if (cycleActive && audioCtx) {
            const beatInterval = Math.max(0.34, 0.78 - resonance * 0.32);

            if (audioCtx.currentTime >= nextHeartbeatTime) {
                playHeartbeat();
                nextHeartbeatTime = audioCtx.currentTime + beatInterval;
            }
        }

        if (resonance >= 1) {
            playDeflate();
            resonance = 0;
            cycleActive = false;
            completePuzzle();
        }

        if (resonance <= 0) {
            cycleActive = false;
        }

        const scale = 0.28 + resonance * 1.35;
        formGroup.scale.setScalar(scale);
        ringGroup.scale.setScalar(scale);

        const isPhonePortrait =
        window.innerWidth <= 768 &&
        window.innerHeight > window.innerWidth;

        const mobileYOffset = 0;

        formGroup.position.y = mobileYOffset;
        ringGroup.position.y = mobileYOffset;

        formGroup.rotation.y += 0.01;
        formGroup.rotation.x += 0.003;

        ringGroup.rotation.z += 0.0015 + ascension * 0.0004;

        ringGroup.children.forEach((ring, index) => {
            const pulse =
            Math.sin(Date.now() * 0.0015 + index) * 0.5 + 0.5;

            const layerScale =
            1 + pulse * 0.015 + index * 0.01;

            ring.scale.setScalar(layerScale);

            ring.children.forEach(dot => {
                dot.material.opacity = 0.45 + pulse * 0.35;
            });
        });

        material.emissiveIntensity = 0.35 + resonance * 1.1 + ascension * 0.08;
    }

    renderer.render(scene,camera);
}

        );
